<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#1e3a8a" stroke="#3b82f6" stroke-width="8"/>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#60a5fa" stroke-width="4" opacity="0.7"/>
  
  <!-- Inner Circles - Game Elements -->
  <circle cx="180" cy="180" r="35" fill="#ef4444" opacity="0.9">
    <animate attributeName="r" values="35;40;35" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="332" cy="180" r="35" fill="#3b82f6" opacity="0.9">
    <animate attributeName="r" values="35;40;35" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="180" cy="332" r="35" fill="#10b981" opacity="0.9">
    <animate attributeName="r" values="35;40;35" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="332" cy="332" r="35" fill="#f59e0b" opacity="0.9">
    <animate attributeName="r" values="35;40;35" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Center Element -->
  <circle cx="256" cy="256" r="50" fill="#ffffff" opacity="0.95"/>
  <circle cx="256" cy="256" r="35" fill="#1e3a8a"/>
  
  <!-- Lightning/Speed Effect -->
  <path d="M240 220 L265 240 L245 260 L270 280 M240 260 L270 240" 
        stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="0.8s" repeatCount="indefinite"/>
  </path>
  
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="48" font-weight="bold" fill="#ffffff">SpeedyTap</text>
  
  <!-- Subtitle -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="24" fill="#60a5fa">Fast. Fun. Addictive.</text>
</svg> 